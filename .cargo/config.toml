# Glyph workspace build configuration

# macOS: universal binary (Intel + Apple Silicon)
# Uncomment to build fat binaries:
# [target.x86_64-apple-darwin]
# [target.aarch64-apple-darwin]

# Windows cross-compilation from macOS using xwin + LLVM
# Install: cargo install cargo-xwin
# Then: cargo xwin build --target x86_64-pc-windows-msvc --release
[target.x86_64-pc-windows-msvc]
linker = "rust-lld"

[target.aarch64-pc-windows-msvc]
linker = "rust-lld"

# Optimisation profile for release builds
[profile.release]
opt-level     = 3
lto           = "thin"
codegen-units = 1
strip         = "symbols"

# Fast dev profile — incremental, minimal opt
[profile.dev]
opt-level     = 0
incremental   = true
