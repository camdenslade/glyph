[package]
name = "demo-glyph"
version = "0.1.0"
edition = "2021"
default-run = "demo-glyph"

[[bin]]
name = "demo-glyph"
path = "src/main.rs"

[[bin]]
name = "demo-glyph-hot"
path = "src/main_hot.rs"
required-features = ["hot-reload"]

[lib]
name = "demo_glyph"
crate-type = ["cdylib", "rlib"]

[dependencies]
core-glyph     = { version = "0.1.0", path = "../core-glyph" }
platform-glyph = { version = "0.1.0", path = "../platform-glyph" }
widgets-glyph  = { version = "0.1.0", path = "../widgets-glyph" }
hot-glyph      = { version = "0.1.0", path = "../hot-glyph", optional = true }
taffy          = "0.5"

[features]
hot-reload = ["hot-glyph", "platform-glyph/hot-reload"]
